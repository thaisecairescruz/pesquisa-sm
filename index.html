<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Projeto com a Thaise</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .card { background: white; border-radius: 16px; padding: 2rem 1.5rem; max-width: 480px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .progress-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 1.5rem; }
  .progress-fill { height: 4px; background: #534AB7; border-radius: 4px; transition: width 0.3s; }
  .progress-text { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 6px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
  .scrum-hint { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .question { font-size: 16px; font-weight: 600; line-height: 1.55; margin-bottom: 20px; color: #1a1a1a; }
  .optional { font-size: 12px; font-weight: 400; color: #aaa; margin-left: 6px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .btn-option { padding: 13px 8px; border-radius: 8px; font-size: 14px; cursor: pointer; text-align: center; border: 1.5px solid #e0e0e0; background: white; color: #1a1a1a; font-weight: 400; transition: all 0.15s; line-height: 1.3; width: 100%; }
  .btn-option:hover { border-color: #534AB7; color: #534AB7; }
  .btn-option.selected { font-weight: 600; }
  .stars-row { display: flex; gap: 6px; }
  .btn-star { flex: 1; padding: 12px 2px; border-radius: 8px; cursor: pointer; text-align: center; border: 1.5px solid #e0e0e0; background: white; transition: all 0.15s; min-width: 0; }
  .btn-star:hover { border-color: #534AB7; }
  .star-emoji { font-size: 22px; display: block; }
  .star-label { font-size: 9px; margin-top: 3px; color: #888; line-height: 1.3; display: block; }
  .btn-star.selected .star-label { font-weight: 600; }
  textarea { width: 100%; border-radius: 8px; border: 1.5px solid #e0e0e0; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 100px; outline: none; color: #1a1a1a; }
  textarea:focus { border-color: #534AB7; }
  .btn-submit { margin-top: 10px; width: 100%; padding: 13px; border-radius: 8px; font-size: 15px; border: 1.5px solid #e0e0e0; background: white; cursor: pointer; font-weight: 600; color: #1a1a1a; transition: all 0.15s; }
  .btn-submit:hover { background: #534AB7; color: white; border-color: #534AB7; }
  .btn-back { margin-top: 18px; font-size: 13px; color: #aaa; background: none; border: none; cursor: pointer; padding: 0; display: block; }
  .btn-back:hover { color: #534AB7; }
  .intro-emoji { font-size: 36px; text-align: center; margin-bottom: 14px; }
  .intro-title { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #1a1a1a; }
  .intro-text { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 10px; }
  .intro-box { background: #f5f5f5; border-radius: 8px; padding: 11px 14px; margin-bottom: 22px; font-size: 13px; color: #555; line-height: 1.6; }
  .btn-start { width: 100%; padding: 13px; font-size: 15px; border-radius: 8px; border: 1.5px solid #e0e0e0; background: white; cursor: pointer; font-weight: 600; color: #1a1a1a; transition: all 0.15s; }
  .btn-start:hover { background: #534AB7; color: white; border-color: #534AB7; }
  .thanks-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
  .thanks-sub { color: #888; font-size: 14px; margin-bottom: 1.25rem; }
  .satisfaction-box { background: #FAECE7; border-radius: 10px; padding: 0.875rem 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
  .satisfaction-label { font-size: 12px; color: #993C1D; font-weight: 600; margin-bottom: 2px; }
  .satisfaction-value { font-size: 16px; font-weight: 600; }
  .linkedin-box { border-radius: 12px; overflow: hidden; border: 2px solid #534AB7; margin-bottom: 12px; }
  .linkedin-header { background: #534AB7; padding: 12px 16px; }
  .linkedin-header p { color: white; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .linkedin-header span { color: white; font-size: 12px; opacity: 0.85; }
  .linkedin-body { background: #EEEDFE; padding: 14px 16px; }
  .linkedin-text { font-size: 13px; color: #3C3489; margin-bottom: 10px; line-height: 1.6; }
  .btn-copy { width: 100%; font-size: 14px; padding: 10px; border-radius: 8px; border: 1.5px solid #AFA9EC; background: white; cursor: pointer; color: #534AB7; font-weight: 600; margin-bottom: 8px; transition: all 0.15s; }
  .btn-copy:hover { background: #534AB7; color: white; }
  .btn-linkedin { width: 100%; font-size: 14px; padding: 10px; border-radius: 8px; background: #534AB7; cursor: pointer; color: white; font-weight: 600; text-decoration: none; display: block; text-align: center; transition: all 0.15s; }
  .btn-linkedin:hover { background: #3C3489; }
  .linkedin-hint { font-size: 11px; color: #6B5BAF; margin-top: 10px; line-height: 1.5; }
  .linkedin-hint2 { font-size: 11px; color: #6B5BAF; margin-top: 8px; line-height: 1.5; border-top: 1px solid #CEC9F0; padding-top: 8px; }
  .no-linkedin-box { background: #f5f5f5; border-radius: 8px; padding: 0.875rem; margin-bottom: 12px; font-size: 13px; color: #888; }
  .no-linkedin-box a { color: #534AB7; }
  .sending { text-align: center; padding: 2rem; color: #888; font-size: 15px; }
  .error-box { background: #FAECE7; border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 13px; color: #993C1D; line-height: 1.6; }
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw80nY55u9UPbUodAih12hefS-QHi80mHzrd3REJHxPHUNkTQkAjFqXLKcnYLeki6tC/exec";

const scaleLabels = ["Raramente","Às vezes","Na maioria das vezes","Sempre"];
const scaleColors = ["#E24B4A","#EF9F27","#1D9E75","#0F6E56"];
const starLabels = ["Muito insatisfatório","Insatisfatório","Neutro","Satisfatório","Muito satisfatório"];
const starColors = ["#E24B4A","#EF9F27","#888780","#1D9E75","#0F6E56"];
const starEmojis = ["😞","😕","😐","🙂","🌟"];

const blockStyles = {
  "Comunicação & Clareza": { bg: "#E8F4FD", color: "#1a6fa8" },
  "Você como SM":          { bg: "#EEEDFE", color: "#534AB7" },
  "Suporte & Facilitação": { bg: "#EAF3DE", color: "#3B6D11" },
  "Satisfação geral":      { bg: "#FAECE7", color: "#993C1D" },
  "LinkedIn":              { bg: "#FAEEDA", color: "#854F0B" },
  "Mensagem final":        { bg: "#f5f5f5",  color: "#666" },
};

const questions = [
  { id:"q1", block:"Comunicação & Clareza", text:"Você sempre soube o que precisava fazer durante o projeto?", type:"scale" },
  { id:"q2", block:"Comunicação & Clareza", text:"As informações sobre o andamento chegavam de forma clara e no momento certo?", type:"scale" },
  { id:"q3", block:"Você como SM", text:"Você sentiu que eu me preocupava genuinamente com o bem-estar e o desenvolvimento do time?", type:"scale", scrum:"Servant leader — Scrum Guide 2020" },
  { id:"q4", block:"Você como SM", text:"Quando algo dificultava o trabalho do time, eu agia para resolver ou facilitar a solução?", type:"scale", scrum:"Remoção de impedimentos — Scrum Guide 2020" },
  { id:"q5", block:"Você como SM", text:"Você percebia que eu buscava melhorar a forma como o time trabalhava junto, não só entregar tarefas?", type:"scale", scrum:"Melhoria contínua — Scrum Guide 2020" },
  { id:"q6", block:"Suporte & Facilitação", text:"Quando algo travava seu trabalho, você se sentiu apoiado para resolver?", type:"scale" },
  { id:"q7", block:"Suporte & Facilitação", text:"As reuniões do projeto valiam o seu tempo?", type:"scale" },
  { id:"q8", block:"Satisfação geral", text:"No geral, o quanto foi satisfatório trabalhar comigo?", type:"stars" },
  { id:"q9", block:"LinkedIn", text:"Uma recomendação sua no LinkedIn pode abrir portas na minha carreira como SM. Você toparia me ajudar com isso?", type:"linkedin" },
  { id:"q10", block:"Mensagem final", text:"Quer deixar alguma mensagem, crítica ou sugestão?", type:"text", optional:true },
];

const linkedinText = `Tive a oportunidade de participar de um projeto ágil facilitado pela Thaise, que atuou como Scrum Master de primeira viagem. Mesmo sendo sua estreia no papel, ela demonstrou escuta ativa, organização e capacidade de manter o time focado e informado ao longo dos sprints. Recomendo pelo comprometimento, clareza na comunicação e pela leveza com que conduziu o processo.`;

let step = -1;
let answers = {};

function render() {
  const app = document.getElementById("app");
  if (step === -1) { renderIntro(app); return; }
  if (step === questions.length) { renderSending(app); return; }
  renderQuestion(app);
}

function renderIntro(app) {
  app.innerHTML = `
    <div class="intro-emoji">👋</div>
    <p class="intro-title">Oi! 1 minutinho seu vale muito pra mim.</p>
    <p class="intro-text">Trabalhamos juntos e agora quero entender, de verdade, como foi esse processo na sua visão.</p>
    <p class="intro-text">São <strong>9 perguntas rápidas</strong> (+ 1 opcional) — menos de 1 minuto.</p>
    <div class="intro-box">💬 <strong>Pode ser sincero, de verdade.</strong> Não me ofendo fácil e não tomarei como nada pessoal — só como referência para melhorar mesmo.</div>
    <button class="btn-start" onclick="nextStep()">Vamos lá →</button>
  `;
}

function renderQuestion(app) {
  const q = questions[step];
  const total = questions.length;
  const pct = Math.round(((step + 1) / total) * 100);
  const bs = blockStyles[q.block] || {};

  let body = "";

  if (q.type === "scale") {
    body = `<div class="grid2">${scaleLabels.map((l, i) => {
      const sel = answers[q.id] === i;
      const c = scaleColors[i];
      return `<button class="btn-option${sel?" selected":""}" style="${sel?`border-color:${c};color:${c};background:${c}18`:""}" onclick="selectScale(${i})">${l}</button>`;
    }).join("")}</div>`;
  } else if (q.type === "stars") {
    body = `<div class="stars-row">${starEmojis.map((em, i) => {
      const sel = answers[q.id] === i;
      const c = starColors[i];
      return `<button class="btn-star${sel?" selected":""}" style="${sel?`border-color:${c};background:${c}18`:""}" onclick="selectStar(${i})">
        <span class="star-emoji">${em}</span>
        <span class="star-label" style="${sel?`color:${c}`:""}">${starLabels[i]}</span>
      </button>`;
    }).join("")}</div>`;
  } else if (q.type === "linkedin") {
    body = `<div class="grid2">${[true,false].map(v => {
      const sel = answers[q.id] === v;
      return `<button class="btn-option${sel?" selected":""}" style="${sel?"border-color:#AFA9EC;color:#534AB7;background:#EEEDFE":""}" onclick="selectLinkedin(${v})">${v?"Sim, topo!":"Por enquanto não"}</button>`;
    }).join("")}</div>`;
  } else if (q.type === "text") {
    body = `
      <textarea id="txt-q10" placeholder="Escreva aqui..." onchange="answers['q10']=this.value" oninput="answers['q10']=this.value">${answers[q.id]||""}</textarea>
      <button class="btn-submit" onclick="submitForm()">Enviar respostas</button>
    `;
  }

  app.innerHTML = `
    <div class="progress-text"><span>${step+1} de ${total}</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="badge" style="background:${bs.bg};color:${bs.color}">${q.block}</span>
    ${q.scrum ? `<p class="scrum-hint">📖 ${q.scrum}</p>` : ""}
    <p class="question">${q.text}${q.optional?`<span class="optional">(opcional)</span>`:""}</p>
    ${body}
    ${step > 0 ? `<button class="btn-back" onclick="prevStep()">← Voltar</button>` : ""}
  `;
}

function renderSending(app) {
  app.innerHTML = `<div class="sending">⏳ Enviando suas respostas...</div>`;
  sendToSheets();
}

function renderThanks() {
  const app = document.getElementById("app");
  const starVal = answers["q8"];
  const linkedin = answers["q9"];

  let satisfactionHtml = "";
  if (starVal !== undefined) {
    satisfactionHtml = `
      <div class="satisfaction-box">
        <span style="font-size:32px">${starEmojis[starVal]}</span>
        <div>
          <p class="satisfaction-label">Sua avaliação</p>
          <p class="satisfaction-value" style="color:${starColors[starVal]}">${starLabels[starVal]}</p>
        </div>
      </div>`;
  }

  let linkedinHtml = linkedin ? `
    <div class="linkedin-box">
      <div class="linkedin-header">
        <p>Você topou! Muito obrigada 💜</p>
        <span>Siga os 2 passos abaixo — leva menos de 2 minutos.</span>
      </div>
      <div class="linkedin-body">
        <p class="linkedin-text">${linkedinText}</p>
        <button class="btn-copy" id="btn-copy" onclick="copyLinkedin()">1. Copiar o texto acima</button>
        <a class="btn-linkedin" href="https://www.linkedin.com/in/thaise-caires" target="_blank">2. Abrir perfil no LinkedIn →</a>
        <p class="linkedin-hint">No perfil, role até <strong>Recomendações</strong> e clique em <strong>"Recomendar Thaise"</strong>.</p>
        <p class="linkedin-hint2">O texto acima é só uma sugestão — fique à vontade para escrever com suas próprias palavras.</p>
      </div>
    </div>` : `
    <div class="no-linkedin-box">Se mudar de ideia: <a href="https://www.linkedin.com/in/thaise-caires/" target="_blank">linkedin.com/in/thaise-caires</a></div>`;

  app.innerHTML = `
    <h2 class="thanks-title">Obrigada pelas respostas!</h2>
    <p class="thanks-sub">Suas respostas foram registradas.</p>
    ${satisfactionHtml}
    ${linkedinHtml}
  `;
}

function renderError() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <h2 class="thanks-title">Obrigada pelas respostas!</h2>
    <p class="thanks-sub">Suas respostas foram registradas.</p>
    <div class="error-box">⚠️ Houve um problema ao salvar na planilha. Se quiser, tente novamente ou avise a Thaise diretamente.</div>
    <button class="btn-submit" style="margin-top:12px" onclick="step=0;answers={};render()">Tentar novamente</button>
  `;
}

function selectScale(i) {
  answers[questions[step].id] = i;
  setTimeout(nextStep, 260);
  render();
}

function selectStar(i) {
  answers[questions[step].id] = i;
  setTimeout(nextStep, 260);
  render();
}

function selectLinkedin(v) {
  answers[questions[step].id] = v;
  setTimeout(nextStep, 260);
  render();
}

function nextStep() { step++; render(); }
function prevStep() { step--; render(); }

function submitForm() {
  answers["q10"] = document.getElementById("txt-q10")?.value || "";
  step = questions.length;
  render();
}

function sendToSheets() {
  const params = new URLSearchParams({
    ts: new Date().toISOString(),
    q1: scaleLabels[answers.q1] ?? "",
    q2: scaleLabels[answers.q2] ?? "",
    q3: scaleLabels[answers.q3] ?? "",
    q4: scaleLabels[answers.q4] ?? "",
    q5: scaleLabels[answers.q5] ?? "",
    q6: scaleLabels[answers.q6] ?? "",
    q7: scaleLabels[answers.q7] ?? "",
    q8: starLabels[answers.q8] ?? "",
    q9: answers.q9 === true ? "Sim" : "Não",
    q10: answers.q10 || "",
  });

  fetch(`${SCRIPT_URL}?${params.toString()}`, { method: "GET" })
    .then(() => renderThanks())
    .catch(() => renderError());
}

function copyLinkedin() {
  navigator.clipboard.writeText(linkedinText).then(() => {
    const btn = document.getElementById("btn-copy");
    if (btn) { btn.textContent = "✓ Texto copiado!"; setTimeout(() => { btn.textContent = "1. Copiar o texto acima"; }, 2500); }
  });
}

render();
</script>
</body>
</html>
